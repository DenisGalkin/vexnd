<!DOCTYPE html>
<html lang="{{ html_lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta http-equiv="content-language" content="{{ content_language }}">
    <title>Open App | {{ site_name }}</title>
    <meta name="robots" content="noindex,nofollow">
    <link rel="icon" href="{{ url_for('favicon') }}" sizes="any">
    <link rel="icon" type="image/png" sizes="512x512" href="{{ url_for('favicon_png') }}">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            min-height: 100svh;
            display: grid;
            place-items: center;
            background: #050505;
            color: #f5f5f5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
            padding:
                calc(16px + env(safe-area-inset-top))
                calc(16px + env(safe-area-inset-right))
                calc(16px + env(safe-area-inset-bottom))
                calc(16px + env(safe-area-inset-left));
        }
        @supports (height: 100dvh) {
            body {
                min-height: 100dvh;
            }
        }
        .card {
            width: min(92vw, 32rem);
            padding: 2rem;
            border-radius: 1.5rem;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
        }
        a.button {
            display: inline-block;
            margin-top: 1rem;
            padding: 0.95rem 1.25rem;
            border-radius: 0.9rem;
            background: #ffffff;
            color: #000000;
            text-decoration: none;
            font-weight: 600;
        }
        p.secondary {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.95rem;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>{{ _('Открываем приложение…') }}</h1>
        <p class="secondary">
            {{ _('Если приложение не открылось автоматически, нажмите кнопку ниже.') }}
        </p>
        <a class="button" href="{{ target }}">{{ _('Открыть приложение') }}</a>
        {% if fallback %}
        <p class="secondary">
            <a href="{{ fallback }}" style="color:#9fd3ff;">{{ _('Скачать приложение') }}</a>
        </p>
        {% endif %}
    </div>
    <noscript>
        <meta http-equiv="refresh" content="0;url={{ target }}">
    </noscript>
    <script>
        window.location.replace({{ target|tojson }});
    </script>
</body>
</html>
