<div class="flex flex-col gap-5 lg:flex-row lg:items-center lg:justify-between">
  <div class="min-w-0 max-w-3xl">
    <div class="inline-flex items-center gap-2 rounded-full border border-white/10 bg-white/5 px-3 py-1.5 text-[11px] font-semibold uppercase tracking-[0.24em] text-gray-300">
      <span class="inline-block h-2 w-2 rounded-full {{ 'bg-emerald-400' if is_active else 'bg-amber-400' }}"></span>
      {{ _('VEXND Account') }}
    </div>
    <div class="mt-4 flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
      <div class="min-w-0">
        <h1 class="text-3xl sm:text-4xl font-extrabold tracking-tight">{{ _('Личный кабинет') }}</h1>
        <p class="mt-2 text-sm sm:text-base text-gray-400">
          {{ _('Аккаунт:') }}
          <span class="text-gray-100 font-semibold break-anywhere">{{ current_user.email }}</span>
        </p>
      </div>
    </div>
  </div>

  <div class="dashboard-status-pill {{ 'is-active' if is_active else 'is-inactive' }}">
    {% if is_active %}
      {{ _('Подписка активна') }}
    {% elif has_subscription_record %}
      {{ _('Ожидает оплаты') }}
    {% else %}
      {{ _('Нет подписки') }}
    {% endif %}
  </div>
</div>
