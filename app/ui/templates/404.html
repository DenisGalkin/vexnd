    <div class="glass-effect max-w-lg w-full rounded-2xl p-12 text-center">

            404
        </div>
        <h1 class="text-4xl font-bold mb-4">

        </p>
        <a href="{{ url_lang('index') }}" class="inline-block bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg font-semibold transition-all">
